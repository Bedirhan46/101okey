<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>101 Okey Geliştirilmiş</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#071b2d;
  color:white;
  overflow:hidden;
}

.game{
  width:100vw;
  height:100vh;
  background:radial-gradient(circle,#0b5b8e,#021827 75%);
  position:relative;
}

.top{
  height:60px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:rgba(0,0,0,.4);
  font-weight:bold;
  font-size:18px;
}

.infoPanel{
  position:absolute;
  top:65px;
  left:10px;
  right:10px;
  background:rgba(0,0,0,.45);
  border-radius:12px;
  padding:10px;
  display:flex;
  justify-content:space-around;
  font-size:16px;
  z-index:2;
}

.table{
  position:absolute;
  top:125px;
  left:5%;
  right:5%;
  height:240px;
  background:rgba(0,0,0,.28);
  border:2px solid #2d86bd;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:rgba(255,255,255,.14);
  font-size:48px;
  font-weight:bold;
}

.tile{
  width:46px;
  height:66px;
  background:#f7f3e8;
  border-radius:8px;
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:27px;
  font-weight:900;
  box-shadow:0 5px 8px rgba(0,0,0,.55);
  position:relative;
  cursor:pointer;
  user-select:none;
}

.tile::after{
  content:"";
  position:absolute;
  bottom:7px;
  width:10px;
  height:10px;
  background:#ccc;
  border-radius:50%;
}

.selected{
  transform:translateY(-16px);
  outline:3px solid #ffe600;
}

.red{color:#b20d0d;}
.blueText{color:#0077bd;}
.yellow{color:#d99b00;}
.black{color:#111;}
.joker{color:#7b1fa2;}

.groupGap{
  margin-right:24px;
}

.rack{
  position:absolute;
  left:4%;
  right:4%;
  bottom:130px;
  min-height:175px;
  background:linear-gradient(#c47a22,#6c340a);
  border:4px solid #e1aa53;
  border-radius:14px;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  align-content:flex-start;
}

function openHand(){
  let result = calculateReal101(player.hand);

  if(result.total >= 101){
    player.opened = true;
    message.innerHTML = "El açıldı. Toplam puan: " + result.total;
  }else{
    message.innerHTML = "El açılamaz. Toplam " + result.total + ". En az 101 lazım.";
  }

  updateInfo();
}

function drawTile(){
  if(deck.length === 0){
    message.innerHTML = "Ortada taş kalmadı.";
    return;
  }

  player.hand.push(deck.pop());
  updateAll("Taş çektin.");
}

function takeDiscard(){
  if(discardPile.length === 0){
    message.innerHTML = "Atılan taş yok.";
    return;
  }

  player.hand.push(discardPile.pop());
  updateAll("Atılan taşı aldın.");
}

function discardTile(){
  if(selectedIndex === null){
    message.innerHTML = "Atmak için bir taş seç.";
    return;
  }

  let tile = player.hand.splice(selectedIndex,1)[0];
  discardPile.push(tile);
  selectedIndex = null;

  updateAll("Taş atıldı.");
}

function finishGame(){
  if(!player.opened){
    message.innerHTML = "Bitmek için önce el açmalısın.";
    return;
  }

  if(player.hand.length > 1){
    message.innerHTML = "Bitmek için elde en fazla 1 taş kalmalı.";
    return;
  }

  message.innerHTML = "Tebrikler, el bitti.";
}
