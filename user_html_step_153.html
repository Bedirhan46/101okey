function openHand(){
  if(currentPlayer!==0)return setInfo("Sıra sende değil.");

  let best=findBestGroups(players[0].hand);

  if(best.total<101){
    return setInfo("El açılamaz. Toplam: "+best.total+" / 101 gerekli.");
  }

  players[0].opened=true;
  players[0].openTiles=best.tiles;
  players[0].hand=players[0].hand.filter((_,i)=>!best.used.has(i));
  updateAll("El açıldı. Toplam: "+best.total);
}

function finishGame(){
  if(currentPlayer!==0)return setInfo("Sıra sende değil.");
  if(!players[0].opened)return setInfo("Önce el açmalısın.");
  if(players[0].hand.length>1)return setInfo("Bitmek için elde en fazla 1 taş kalmalı.");

  if(players[0].hand.length===1)discardPile.push(players[0].hand.pop());
  endRound(0);
}

function endRound(winner){
  players.forEach((p,i)=>{
    if(i!==winner){
      let penalty=p.opened?p.hand.reduce((a,t)=>a+value(t),0):101;
      p.score+=penalty;
    }
  });
  updateAll(players[winner].name+" eli bitirdi. Puanlar yazıldı.");
}
